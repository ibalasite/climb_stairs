<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>爬樓梯抽獎</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --card-2: #16213e;
      --accent: #6c63ff;
      --accent-dim: #4a44c0;
      --gold: #ffd700;
      --gold-dim: #b8960a;
      --text: #e8e8f0;
      --text-dim: #9090b0;
      --border: #2a2a45;
      --danger: #e05555;
      --success: #55c855;
      --radius: 12px;
      --radius-sm: 8px;
      --duration: 200ms;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.5;
    }

    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Shared layout ── */
    .page {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem 1rem;
      gap: 1.5rem;
    }

    .page-title {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      width: 100%;
      max-width: 420px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
    }

    /* ── Forms ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 0.85rem;
    }

    label {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="text"],
    input[type="number"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 0.95rem;
      padding: 0.6rem 0.85rem;
      outline: none;
      transition: border-color var(--duration);
      width: 100%;
    }

    input:focus {
      border-color: var(--accent);
    }

    input::placeholder {
      color: #555570;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.65rem 1.2rem;
      transition: opacity var(--duration), transform var(--duration);
      width: 100%;
    }

    .btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-gold    { background: var(--gold); color: #111; }
    .btn-danger  { background: var(--danger); color: #fff; }
    .btn-ghost   {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .btn-ghost:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }

    .btn-sm {
      padding: 0.45rem 0.85rem;
      font-size: 0.82rem;
      width: auto;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(6rem);
      background: var(--card-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.7rem 1.2rem;
      font-size: 0.88rem;
      color: var(--text);
      z-index: 9999;
      transition: transform 280ms cubic-bezier(0.16, 1, 0.3, 1);
      white-space: nowrap;
      max-width: 90vw;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
    }

    #toast.toast-error { border-color: var(--danger); color: var(--danger); }
    #toast.toast-success { border-color: var(--success); color: var(--success); }

    /* ── Waiting room ── */
    .room-code-box {
      background: var(--bg);
      border: 2px solid var(--accent);
      border-radius: var(--radius-sm);
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color var(--duration);
    }

    .room-code-box:hover { border-color: #a78bfa; }

    .room-code-label {
      font-size: 0.75rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.25rem;
    }

    .room-code-value {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.25em;
      color: var(--accent);
    }

    .room-code-hint {
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-top: 0.2rem;
    }

    .player-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .player-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.5rem 0.7rem;
      background: var(--bg);
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
    }

    .player-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .player-dot.offline { opacity: 0.35; }

    .player-name { flex: 1; }
    .player-badge {
      font-size: 0.7rem;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    .player-offline-label {
      font-size: 0.72rem;
      color: var(--text-dim);
    }

    /* ── Game layout ── */
    .game-page {
      flex: 1;
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 1fr;
      gap: 0;
      height: 100vh;
      overflow: hidden;
    }

    @media (min-width: 768px) {
      .game-page {
        grid-template-columns: 1fr 280px;
        grid-template-rows: auto 1fr;
      }
    }

    .game-header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.25rem;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      gap: 1rem;
    }

    .game-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .status-badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .status-running  { background: #1a3a1a; color: var(--success); border: 1px solid var(--success); }
    .status-revealing{ background: #3a2a0a; color: var(--gold); border: 1px solid var(--gold); }
    .status-finished { background: #1a1a3a; color: var(--accent); border: 1px solid var(--accent); }
    .status-waiting  { background: var(--card-2); color: var(--text-dim); border: 1px solid var(--border); }

    .canvas-area {
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }

    #ladder-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .sidebar {
      background: var(--card);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-section {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-title {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
    }

    .result-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .result-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.7rem;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      border: 1px solid transparent;
      animation: fadeSlideIn 300ms ease both;
    }

    .result-item.winner {
      background: #1c1600;
      border-color: var(--gold-dim);
    }

    .result-item.loser {
      background: var(--bg);
      border-color: var(--border);
      color: var(--text-dim);
    }

    .result-rank {
      font-size: 0.75rem;
      color: var(--text-dim);
      width: 1.4rem;
      text-align: right;
      flex-shrink: 0;
    }

    .result-crown {
      color: var(--gold);
      font-size: 0.9rem;
    }

    .result-name { flex: 1; font-weight: 500; }
    .result-you  { font-size: 0.72rem; color: var(--accent); font-weight: 600; }

    .controls-bar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    @media (max-width: 767px) {
      .game-page {
        grid-template-rows: auto 1fr auto auto;
      }
      .sidebar {
        border-left: none;
        border-top: 1px solid var(--border);
        max-height: 200px;
        flex-direction: row;
        overflow-x: auto;
      }
      .sidebar-section { border-bottom: none; border-right: 1px solid var(--border); }
      .result-list { flex-direction: row; flex: initial; overflow-y: initial; overflow-x: auto; }
    }

    /* ── Connection indicator ── */
    .conn-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .conn-dot.connected    { background: var(--success); }
    .conn-dot.connecting   { background: var(--gold); animation: pulse 1s ease infinite; }
    .conn-dot.disconnected { background: var(--danger); }

    /* ── Misc ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 1rem 0;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-bottom: 0.4rem;
    }

    .info-row strong { color: var(--text); }

    .lobby-cards {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 420px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .error-msg {
      font-size: 0.82rem;
      color: var(--danger);
      margin-top: 0.4rem;
      min-height: 1.1rem;
    }

    .winner-count-display {
      font-size: 0.85rem;
      color: var(--text-dim);
    }
    .winner-count-display strong { color: var(--gold); }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toast"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
