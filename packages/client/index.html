<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>爬樓梯抽獎</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --card-2: #16213e;
      --accent: #6c63ff;
      --accent-dim: #4a44c0;
      --gold: #ffd700;
      --gold-dim: #b8960a;
      --text: #e8e8f0;
      --text-dim: #9090b0;
      --border: #2a2a45;
      --danger: #e05555;
      --success: #55c855;
      --radius: 12px;
      --radius-sm: 8px;
      --duration: 200ms;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.5;
    }

    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Shared layout ── */
    .page {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem 1rem;
      gap: 1.5rem;
    }

    .page-title {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      width: 100%;
      max-width: 420px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
    }

    /* ── Forms ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 0.85rem;
    }

    label {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="text"],
    input[type="number"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 0.95rem;
      padding: 0.6rem 0.85rem;
      outline: none;
      transition: border-color var(--duration);
      width: 100%;
    }

    input:focus {
      border-color: var(--accent);
    }

    input::placeholder {
      color: #555570;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.65rem 1.2rem;
      transition: opacity var(--duration), transform var(--duration);
      width: 100%;
    }

    .btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-gold    { background: var(--gold); color: #111; }
    .btn-danger  { background: var(--danger); color: #fff; }
    .btn-ghost   {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .btn-ghost:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }

    .btn-sm {
      padding: 0.45rem 0.85rem;
      font-size: 0.82rem;
      width: auto;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(6rem);
      background: var(--card-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.7rem 1.2rem;
      font-size: 0.88rem;
      color: var(--text);
      z-index: 9999;
      transition: transform 280ms cubic-bezier(0.16, 1, 0.3, 1);
      white-space: nowrap;
      max-width: 90vw;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
    }

    #toast.toast-error { border-color: var(--danger); color: var(--danger); }
    #toast.toast-success { border-color: var(--success); color: var(--success); }

    /* ── Waiting room ── */
    .room-code-box {
      background: var(--bg);
      border: 2px solid var(--accent);
      border-radius: var(--radius-sm);
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color var(--duration);
    }

    .room-code-box:hover { border-color: #a78bfa; }

    .room-code-label {
      font-size: 0.75rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.25rem;
    }

    .room-code-value {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.25em;
      color: var(--accent);
    }

    .room-code-hint {
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-top: 0.2rem;
    }

    .player-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .player-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.5rem 0.7rem;
      background: var(--bg);
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
    }

    .player-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .player-dot.offline { opacity: 0.35; }

    .player-name { flex: 1; }
    .player-badge {
      font-size: 0.7rem;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    .player-offline-label {
      font-size: 0.72rem;
      color: var(--text-dim);
    }

    /* ── Game layout ── */
    .game-page {
      display: grid;
      grid-template-rows: auto auto auto auto minmax(0, 1fr);
      grid-template-columns: 1fr;
      gap: 0;
      height: 100vh;
      max-height: 100vh;
      overflow: hidden;
    }
    /* Canvas takes only the final 1fr row in col 1; sidebar runs the entire
       right column (row 2 to bottom) so there's no empty space next to the
       prize banner / avatar row. */
    .game-page .canvas-area { grid-row: -2 / -1; min-height: 0; min-width: 0; }
    .game-page .sidebar     { grid-row: 2 / -1; min-height: 0; }

    @media (min-width: 768px) {
      .game-page {
        grid-template-columns: 1fr 280px;
      }
      .game-page .canvas-area { grid-column: 1; }
      .game-page .sidebar     { grid-column: 2; }
    }
    /* Mobile single-col: sidebar drops below canvas as a full-width row */
    @media (max-width: 767px) {
      .game-page .sidebar { grid-row: auto; }
    }

    .game-header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.25rem;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      gap: 1rem;
    }

    .game-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .status-badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .status-running  { background: #1a3a1a; color: var(--success); border: 1px solid var(--success); }
    .status-revealing{ background: #3a2a0a; color: var(--gold); border: 1px solid var(--gold); }
    .status-finished { background: #1a1a3a; color: var(--accent); border: 1px solid var(--accent); }
    .status-waiting  { background: var(--card-2); color: var(--text-dim); border: 1px solid var(--border); }

    .canvas-area {
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }

    #ladder-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .sidebar {
      background: var(--card);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    /* Split sidebar: scrollable content on top, chat slot pinned below */
    .sidebar-content {
      flex: 1 1 auto;
      overflow-y: auto;
      min-height: 0;
    }
    .sidebar-chat-slot { flex: 0 0 auto; border-top: 1px solid var(--border); }
    /* Embedded chat — replaces fixed positioning when inside sidebar */
    #chat-widget.chat-embedded {
      position: static; right: auto; bottom: auto;
      width: 100%; max-width: none;
      box-shadow: none; border: none; border-radius: 0;
    }
    #chat-widget.chat-embedded .chat-body { height: 220px; }
    #chat-widget.chat-embedded.collapsed .chat-body { display: none; }

    .sidebar-section {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-title {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
    }

    .result-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .result-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.7rem;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      border: 1px solid transparent;
      animation: fadeSlideIn 300ms ease both;
    }

    .result-item.winner {
      background: #1c1600;
      border-color: var(--gold-dim);
    }

    .result-item.loser {
      background: var(--bg);
      border-color: var(--border);
      color: var(--text-dim);
    }

    .result-rank {
      font-size: 0.75rem;
      color: var(--text-dim);
      width: 1.4rem;
      text-align: right;
      flex-shrink: 0;
    }

    .result-crown {
      color: var(--gold);
      font-size: 0.9rem;
    }

    .result-name { flex: 1; font-weight: 500; }
    .result-you  { font-size: 0.72rem; color: var(--accent); font-weight: 600; }

    .controls-bar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    @media (max-width: 767px) {
      .game-page {
        grid-template-rows: auto 1fr auto auto;
      }
      .sidebar {
        border-left: none;
        border-top: 1px solid var(--border);
        max-height: 200px;
        flex-direction: row;
        overflow-x: auto;
      }
      .sidebar-section { border-bottom: none; border-right: 1px solid var(--border); }
      .result-list { flex-direction: row; flex: initial; overflow-y: initial; overflow-x: auto; }
    }

    /* ── Connection indicator ── */
    .conn-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .conn-dot.connected    { background: var(--success); }
    .conn-dot.connecting   { background: var(--gold); animation: pulse 1s ease infinite; }
    .conn-dot.disconnected { background: var(--danger); }

    /* ── Misc ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 1rem 0;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-bottom: 0.4rem;
    }

    .info-row strong { color: var(--text); }

    .lobby-cards {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 420px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .error-msg {
      font-size: 0.82rem;
      color: var(--danger);
      margin-top: 0.4rem;
      min-height: 1.1rem;
    }

    .winner-count-display {
      font-size: 0.85rem;
      color: var(--text-dim);
    }
    .winner-count-display strong { color: var(--gold); }
    .winner-count-stepper { display: inline-flex; align-items: center; gap: 0.4rem; }
    .winner-count-stepper .btn-ghost { padding: 0.1rem 0.55rem; font-size: 1rem; line-height: 1; min-width: 1.8em; }

    /* Avatars */
    .avatar-img-wrap { display: inline-flex; border-radius: 50%; overflow: hidden; border: 2px solid; vertical-align: middle; }
    .avatar-img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .avatar-fallback {
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 50%; font-weight: 600; vertical-align: middle;
      line-height: 1;
    }
    .player-avatar-wrap { position: relative; display: inline-flex; align-items: center; }
    .player-avatar-me { transition: transform 0.15s; }
    .player-avatar-me:hover { transform: scale(1.05); }
    .player-avatar-offline-tag {
      position: absolute; bottom: -4px; right: -4px;
      background: rgba(0,0,0,0.7); color: #ccc;
      font-size: 0.55rem; padding: 1px 4px; border-radius: 3px;
    }

    /* Avatar row — aligned variant places each cell directly above the
       corresponding ladder column. Matches renderer's PADDING_SIDE=24 and
       evenly-spaced columns: colX(i) = 24 + i*(W-48)/(N-1). */
    .avatar-row { padding: 0.3rem 0 0; }
    .avatar-row-aligned {
      position: relative; height: 56px;
      width: 100%; max-width: 100%; overflow: visible;
    }
    .avatar-row-aligned .avatar-cell {
      position: absolute; top: 4px;
      left: calc(24px + var(--i, 0) * (100% - 48px) / max(1, var(--n, 2) - 1));
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 0.15rem;
      padding: 0.2rem; border-radius: 6px;
      transition: transform 0.15s, background 0.15s;
    }
    .avatar-cell-name {
      font-size: 0.7rem; max-width: 4.5rem;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .avatar-cell.avatar-clickable { cursor: pointer; }
    .avatar-cell.avatar-clickable:hover {
      background: rgba(212, 175, 55, 0.18);
      transform: translateX(-50%) translateY(-3px);
    }
    .avatar-cell.avatar-done { opacity: 0.45; }

    /* Prize banner — col 1 only; sidebar owns col 2 from row 2 down */
    .prize-banner {
      margin: 0.4rem 0.6rem;
      padding: 0.6rem 1rem;
      background: linear-gradient(90deg, rgba(212,175,55,0.18), rgba(212,175,55,0.05));
      border: 1px solid rgba(212, 175, 55, 0.4);
      border-radius: 6px; font-weight: 600; text-align: center;
    }
    .game-page .prize-banner { grid-column: 1; }
    /* Avatar row sits only over the canvas column so the column-aligned
       offsets match what the canvas renderer draws. */
    .game-page .avatar-row { grid-column: 1; }
    .prize-edit { display: flex; gap: 0.4rem; align-items: center; }
    .prize-edit input {
      flex: 1; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 4px;
      color: #fff; padding: 0.35rem 0.5rem; font-size: 0.85rem; outline: none;
    }
    .prize-edit input:focus { border-color: var(--gold); }
    .prize-display { margin: 0.2rem 0; font-size: 0.95rem; }

    /* Replay link card on game finished */
    .replay-card {
      background: rgba(212, 175, 55, 0.08);
      border: 1px solid rgba(212, 175, 55, 0.25);
      padding: 0.6rem; border-radius: 6px; margin-bottom: 0.6rem;
    }
    .replay-link-input {
      width: 100%; box-sizing: border-box;
      background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
      color: #ddd; border-radius: 4px; padding: 0.3rem 0.4rem;
      font-family: monospace; font-size: 0.75rem;
    }

    /* Replay view */
    .replay-meta {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
      padding: 0.3rem 0.6rem; font-size: 0.78rem; color: var(--text-dim);
    }
    .game-page .replay-meta { grid-column: 1; }

    /* Replay list on lobby */
    .replay-list-card { margin-top: 1rem; }
    .replay-list-item {
      display: grid; grid-template-columns: auto 1fr auto; gap: 0.5rem;
      align-items: center; padding: 0.5rem 0.6rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      text-decoration: none; color: inherit;
    }
    .replay-list-item:last-child { border-bottom: none; }
    .replay-list-item:hover { background: rgba(255,255,255,0.03); }
    .replay-list-room { font-family: monospace; font-weight: 600; color: var(--gold); }
    .replay-list-prize { font-size: 0.85rem; }
    .replay-list-meta { font-size: 0.72rem; color: var(--text-dim); }
    @media (max-width: 480px) {
      .replay-list-item { grid-template-columns: auto 1fr; }
      .replay-list-meta { grid-column: 1 / -1; }
    }
    .mute-btn { padding: 0.15rem 0.45rem; font-size: 1rem; line-height: 1; }

    /* Collapsible cards — header always visible, body toggles */
    .collapsible-card { padding: 0; overflow: hidden; }
    .collapsible-header {
      width: 100%; box-sizing: border-box;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.85rem 1rem;
      background: transparent; border: none; cursor: pointer;
      color: inherit; font: inherit; text-align: left;
    }
    .collapsible-header .card-title { margin: 0; font-weight: 600; }
    .collapsible-chevron { transition: transform 0.2s; color: var(--text-dim, #888); }
    .collapsible-card.collapsed .collapsible-chevron { transform: rotate(-90deg); }
    .collapsible-body {
      padding: 0 1rem 1rem;
      max-height: 800px; overflow: hidden;
      transition: max-height 0.25s ease, padding 0.25s ease, opacity 0.2s ease;
      opacity: 1;
    }
    .collapsible-card.collapsed .collapsible-body {
      max-height: 0; padding-top: 0; padding-bottom: 0; opacity: 0;
    }

    /* Chat widget — bottom-right floating panel */
    #chat-widget {
      position: fixed; right: 1rem; bottom: 1rem;
      width: 300px; max-width: calc(100vw - 2rem);
      background: rgba(20, 22, 28, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.4);
      display: flex; flex-direction: column;
      z-index: 1000; font-size: 0.85rem;
    }
    #chat-widget.collapsed .chat-body { display: none; }
    .chat-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.5rem 0.7rem; cursor: pointer; user-select: none;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px 8px 0 0; font-weight: 600;
    }
    .chat-title { display: inline-flex; align-items: center; gap: 0.4rem; }
    .chat-badge {
      background: var(--gold, #d4af37); color: #111;
      font-size: 0.7rem; font-weight: 700;
      padding: 0.05rem 0.4rem; border-radius: 999px; min-width: 1.2em; text-align: center;
    }
    .chat-toggle {
      background: none; border: none; color: var(--text-dim);
      cursor: pointer; font-size: 1rem; padding: 0.2rem 0.5rem; line-height: 1;
    }
    .chat-body { display: flex; flex-direction: column; height: 280px; }
    .chat-list {
      flex: 1; overflow-y: auto; padding: 0.4rem 0.6rem;
      display: flex; flex-direction: column; gap: 0.25rem;
    }
    .chat-empty { color: var(--text-dim); font-size: 0.78rem; text-align: center; padding: 1rem 0; }
    .chat-line { line-height: 1.35; word-break: break-word; }
    .chat-line-me { background: rgba(212, 175, 55, 0.08); border-radius: 4px; padding: 1px 4px; margin: 0 -4px; }
    .chat-name { font-weight: 600; margin-right: 0.4rem; }
    .chat-text { color: #ddd; }
    .chat-form {
      display: flex; gap: 0.4rem;
      padding: 0.5rem 0.6rem; border-top: 1px solid rgba(255, 255, 255, 0.08);
    }
    .chat-input {
      flex: 1; box-sizing: border-box;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 4px; color: #fff;
      padding: 0.4rem 0.55rem; font-size: 0.9rem; outline: none;
    }
    .chat-input:focus { border-color: var(--gold); }
    .chat-send {
      flex: 0 0 auto;
      background: var(--gold, #d4af37); color: #111;
      border: none; border-radius: 4px;
      padding: 0.4rem 0.85rem; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; min-width: 3.2rem;
    }
    .chat-send:active { opacity: 0.8; }
    /* Ticker — collapsed mode incoming-message preview */
    .chat-ticker {
      max-width: 100%; overflow: hidden;
      max-height: 0; opacity: 0;
      transition: max-height 0.25s, opacity 0.25s;
      pointer-events: none;
      border-radius: 8px 8px 0 0;
    }
    #chat-widget.collapsed .chat-ticker.visible {
      max-height: 2.4em; opacity: 1; pointer-events: auto; cursor: pointer;
      background: rgba(212, 175, 55, 0.12);
      border-bottom: 1px solid rgba(212, 175, 55, 0.3);
    }
    .chat-ticker-inner {
      display: inline-block; white-space: nowrap;
      padding: 0.4rem 0.7rem; line-height: 1.4;
      animation: chat-marquee 8s linear;
    }
    @keyframes chat-marquee {
      0% { transform: translateX(8%); }
      100% { transform: translateX(-100%); }
    }
    /* Mobile — narrow screens (portrait phones) */
    @media (max-width: 480px) {
      #chat-widget { right: 0.5rem; bottom: 0.5rem; width: calc(100vw - 1rem); }
      .chat-body { height: 50vh; max-height: 60vh; }
      .chat-input { font-size: 16px; /* prevents iOS auto-zoom */ }
      .chat-send { padding: 0.5rem 1rem; min-width: 4rem; }
    }
    /* Mobile landscape — short height */
    @media (max-height: 500px) and (orientation: landscape) {
      #chat-widget { width: 280px; }
      .chat-body { height: 180px; }
    }
  </style>
</head>

  <div id="toast"></div>
