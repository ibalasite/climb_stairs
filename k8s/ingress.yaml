# Ingress — defaults to Traefik (Rancher Desktop built-in).
# To use NGINX ingress controller instead, change ingressClassName to "nginx"
# and remove the traefik.ingress.kubernetes.io/* annotations.
#
# WebSocket upgrade notes:
#   Traefik: handles HTTP→WS upgrade natively; no extra annotation required.
#   NGINX:   requires proxy-http-version "1.1" + Upgrade/Connection headers (set below).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ladder-server-ingress
  namespace: ladder-room
  labels:
    app.kubernetes.io/name: ladder-server
    app.kubernetes.io/component: ingress
  annotations:
    # ── Traefik (default controller) ──────────────────────────────────────────
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    # Sticky sessions required for multi-pod WebSocket (post-MVP HPA)
    traefik.ingress.kubernetes.io/service.sticky.cookie: "true"
    traefik.ingress.kubernetes.io/service.sticky.cookie.name: "ladder_sticky"
    # ── NGINX (alternative controller — uncomment if switching to nginx) ───────
    # nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # nginx.ingress.kubernetes.io/proxy-set-header: "Upgrade $http_upgrade"
    # nginx.ingress.kubernetes.io/configuration-snippet: |
    #   proxy_set_header Connection "Upgrade";
    # Timeouts for long-lived WebSocket connections (applies to both controllers)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
spec:
  ingressClassName: traefik
  rules:
    # ladder.local — production-style hostname (add to /etc/hosts if needed)
    - host: ladder.local
      http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: ladder-server-service
                port:
                  name: http
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ladder-server-service
                port:
                  name: http
          - path: /health
            pathType: Exact
            backend:
              service:
                name: ladder-server-service
                port:
                  name: http
          - path: /ready
            pathType: Exact
            backend:
              service:
                name: ladder-server-service
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ladder-client-service
                port:
                  name: http
    # catch-all rule — allows access via localhost:8888 without /etc/hosts
    - http:
        paths:
          # WebSocket upgrade path
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: ladder-server-service
                port:
                  name: http
          # REST API
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ladder-server-service
                port:
                  name: http
          # Health checks
          - path: /health
            pathType: Exact
            backend:
              service:
                name: ladder-server-service
                port:
                  name: http
          - path: /ready
            pathType: Exact
            backend:
              service:
                name: ladder-server-service
                port:
                  name: http
          # Frontend static files (catch-all, must be last)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ladder-client-service
                port:
                  name: http
