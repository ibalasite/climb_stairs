apiVersion: v1
kind: Service
metadata:
  name: ladder-server-service
  namespace: ladder-room
  labels:
    app.kubernetes.io/name: ladder-server
    app.kubernetes.io/component: service
spec:
  selector:
    app: ladder-server
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: http
    - name: metrics
      protocol: TCP
      port: 8080
      targetPort: metrics
  type: ClusterIP
---
# Redis Service (single-node MVP)
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: ladder-room
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
spec:
  selector:
    app: redis
  ports:
    - name: redis
      protocol: TCP
      port: 6379
      targetPort: 6379
  type: ClusterIP
