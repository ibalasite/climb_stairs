apiVersion: apps/v1
kind: Deployment
metadata:
  name: ladder-client
  namespace: ladder-room
  labels:
    app.kubernetes.io/name: ladder-client
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ladder-client
  template:
    metadata:
      labels:
        app: ladder-client
    spec:
      containers:
        - name: ladder-client
          image: ladder-client:local
          imagePullPolicy: Never          # local image, never pull from registry
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ladder-client-service
  namespace: ladder-room
  labels:
    app.kubernetes.io/name: ladder-client
    app.kubernetes.io/component: frontend
spec:
  selector:
    app: ladder-client
  ports:
    - name: http
      port: 80
      targetPort: 80
