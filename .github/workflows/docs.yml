name: GitHub Pages — Docs Deploy

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "pages/**"
      - "features/**"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-docs:
    name: Build & Validate Docs Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify pages directory exists
        run: |
          if [ ! -d "docs/pages" ]; then
            echo "Error: docs/pages/ directory not found."
            exit 1
          fi
          count=$(ls docs/pages/*.html 2>/dev/null | wc -l)
          echo "Found ${count} HTML pages in docs/pages/"
          if [ "$count" -lt 1 ]; then
            echo "Error: No HTML files found in docs/pages/"
            exit 1
          fi

      - name: Validate HTML pages exist
        run: |
          required_pages=(index pdd prd edd arch api schema bdd)
          for page in "${required_pages[@]}"; do
            if [ ! -f "docs/pages/${page}.html" ]; then
              echo "Warning: docs/pages/${page}.html missing"
            else
              echo "OK: docs/pages/${page}.html"
            fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/pages/

  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment deploy URL on commit
        uses: actions/github-script@v7
        if: github.event_name == 'push'
        with:
          script: |
            const url = '${{ steps.deployment.outputs.page_url }}';
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `📄 Docs deployed: ${url}`
            });
